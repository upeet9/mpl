<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPL Tools & Updates</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        /* Layout 2 Kolom untuk Cards */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h2 {
            margin-top: 0;
            color: #0056b3;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #0056b3;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #004494;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>MPL Access Portal</h1>
        <p>Pilih versi tools yang ingin diakses:</p>
    </div>

    <div class="card-container">
        <div class="card">
            <h2>Versi 1</h2>
            <p>Akses stabil untuk fitur dasar dan posting reguler.</p>
            <a href="/v1" class="btn">Buka V1</a>
        </div>

        <div class="card">
            <h2>Versi 2</h2>
            <p>Update terbaru dengan GUI baru dan optimasi bypass.</p>
            <a href="/v2" class="btn">Buka V2</a>
        </div>
    </div>

</body>
</html>
